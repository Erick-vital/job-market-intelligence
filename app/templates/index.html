<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Market Intelligence</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Open-source · local-first</p>
        <h1>Turn job postings into market intelligence.</h1>
        <p class="lead">Upload a CSV or JSONL export, match it against a canonical technical profile, and get fit scores, skill demand, gaps, companies, and an exportable report.</p>
      </section>

      <section class="card">
        <h2>Analyze jobs</h2>
        <form hx-post="/ui/jobs/import" hx-target="#results" hx-swap="innerHTML" enctype="multipart/form-data">
          <label>CSV or JSONL file
            <input type="file" name="file" accept=".csv,.jsonl,.ndjson" required />
          </label>
          <div class="grid-two">
            <label>Max matches
              <input type="number" name="max_matches" min="1" max="50" value="8" />
            </label>
            <label>Min score
              <input type="number" name="min_score" min="0" max="1" step="0.01" placeholder="0.42" />
            </label>
          </div>
          <button type="submit">Run analysis</button>
        </form>
      </section>

      <section id="results"></section>
    </main>
  </body>
</html>
