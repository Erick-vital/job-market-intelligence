<div class="card results">
  <h2>Generated CV</h2>
  <p class="path-note">Saved to: <code>{{ generated.path }}</code></p>
  {% if generated.matched_capabilities %}
    <p><strong>Matched capabilities:</strong> {{ generated.matched_capabilities|join(', ') }}</p>
  {% endif %}
  <pre class="markdown-output"><code>{{ generated.markdown }}</code></pre>
</div>
